<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200" role="img" aria-labelledby="t d">
  <title id="t">CrowdBook Default Cover</title>
  <desc id="d">Default portrait cover used when no custom image was uploaded.</desc>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2a44"/>
      <stop offset="100%" stop-color="#4b5f85"/>
    </linearGradient>
    <pattern id="p1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 40L40 0" stroke="rgba(255,255,255,0.09)" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="800" height="1200" fill="url(#g1)"/>
  <rect width="800" height="1200" fill="url(#p1)"/>
  <rect x="70" y="85" width="660" height="1030" rx="26" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="4"/>
  <g opacity="0.85">
    <circle cx="400" cy="355" r="120" fill="none" stroke="#d9e7ff" stroke-width="10"/>
    <path d="M300 530h200M300 580h200M300 630h150" stroke="#d9e7ff" stroke-width="10" stroke-linecap="round"/>
  </g>
  <text x="400" y="840" text-anchor="middle" fill="#f0f6ff" font-size="62" font-family="Georgia, serif" font-weight="700">CrowdBook</text>
  <text x="400" y="895" text-anchor="middle" fill="#d9e7ff" font-size="30" font-family="Arial, sans-serif">Standard Cover</text>
</svg>
